<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غير متصل | Child Link</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0D3B1E, #1a5c30);
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; text-align: center; color: white; padding: 20px;
  }

  h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }

    background: #F9A825; color: #0D3B1E; border: none;
    padding: 14px 32px; border-radius: 50px; font-weight: 800;
    font-size: 1rem; cursor: pointer;
  }
  .emergency { margin-top: 24px; font-size: .9rem; opacity: .8; }

</head>
<body>
  <div>
    <div class="icon">📡</div>

    <button onclick="location.reload()">🔄 إعادة المحاولة</button>
    <div class="emergency">
      للطوارئ: <strong>📞 16000</strong> — خط نجدة الطفل
    </div>
  </div>

</html>
