<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – الصفحة غير موجودة | Child Link</title>
<meta name="robots" content="noindex">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0D3B1E 0%, #1a5c30 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center; color: white; padding: 20px;
  }
  .container { max-width: 500px; }
  .icon { font-size: 6rem; margin-bottom: 20px; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-20px); }
  }
  h1 { font-size: 6rem; font-weight: 900; color: #F9A825; line-height: 1; }
  h2 { font-size: 1.5rem; margin: 12px 0; opacity: .9; }
  p  { opacity: .7; margin-bottom: 32px; line-height: 1.7; }
  a  {
    display: inline-block;
    background: #F9A825; color: #0D3B1E;
    padding: 14px 32px; border-radius: 50px;
    font-weight: 800; font-size: 1rem;
    text-decoration: none; transition: all .2s;
  }
  a:hover { transform: scale(1.05); background: #FFD54F; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">🔍</div>
    <h1>404</h1>
    <h2>الصفحة غير موجودة</h2>
    <p>الصفحة اللي بتدور عليها مش موجودة أو اتنقلت لمكان تاني</p>
    <a href="/">🏠 ارجع للرئيسية</a>
  </div>
</body>
</html>
